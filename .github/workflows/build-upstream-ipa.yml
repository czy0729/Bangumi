name: Build upstream unsigned IPA

on:
  schedule:
    - cron: '37 8 * * *'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/build-upstream-ipa.yml'
      - '.github/scripts/upstream-ipa.mjs'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Upstream Bangumi tag to build, for example 8.32.3. Leave empty for latest semantic tag.'
        required: false
        type: string
      force:
        description: 'Rebuild and replace existing release assets.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-upstream-ipa-${{ github.event.inputs.tag || 'latest' }}
  cancel-in-progress: false

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-26
    timeout-minutes: 180

    steps:
      - name: Checkout automation
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '23.7.0'

      - name: Resolve upstream tag
        id: upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_TAG: ${{ github.event.inputs.tag || '' }}
          FORCE_REBUILD: ${{ github.event_name == 'push' || github.event.inputs.force == 'true' }}
        run: node .github/scripts/upstream-ipa.mjs resolve

      - name: Skip existing IPA
        if: steps.upstream.outputs.should_build != 'true'
        run: echo "IPA asset ${{ steps.upstream.outputs.asset_name }} already exists on release ${{ steps.upstream.outputs.release_tag }}."

      - name: Download upstream source
        if: steps.upstream.outputs.should_build == 'true'
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          set -euo pipefail
          source_zip="$RUNNER_TEMP/bangumi-$TAG.zip"
          source_dir="$RUNNER_TEMP/Bangumi-$TAG"

          rm -rf "$source_dir" "$source_zip"
          curl -fsSL "https://github.com/czy0729/Bangumi/archive/refs/tags/$TAG.zip" -o "$source_zip"
          unzip -q "$source_zip" -d "$RUNNER_TEMP"

          if [ ! -d "$source_dir" ]; then
            echo "::error::Expected source directory not found: $source_dir"
            exit 1
          fi

          source_dir="$(cd "$source_dir" && pwd -P)"
          echo "SOURCE_DIR=$source_dir" >> "$GITHUB_ENV"

      - name: Prepare upstream source
        if: steps.upstream.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          cd "$SOURCE_DIR"

          node <<'NODE'
          const fs = require('fs')

          const packageJsonPath = 'package.json'
          const pkg = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'))
          const dependencies = pkg.dependencies || {}
          const reactNativeVersion = dependencies['react-native'] || ''
          const reactNativeMinor = Number(String(reactNativeVersion).match(/\d+\.(\d+)/)?.[1] || 0)

          if (reactNativeMinor >= 81 && dependencies['@react-native-community/blur'] === '4.2.0') {
            dependencies['@react-native-community/blur'] = '4.4.1'
            fs.writeFileSync(packageJsonPath, `${JSON.stringify(pkg, null, 2)}\n`)
            console.log(`Updated @react-native-community/blur to 4.4.1 for React Native ${reactNativeVersion}`)
          }

          const reanimatedVersion = dependencies['react-native-reanimated'] || ''
          const reanimatedMajor = Number(String(reanimatedVersion).replace(/^[^0-9]*/, '').split('.')[0])

          if (reanimatedMajor >= 4) {
            const podfilePropertiesPath = 'ios/Podfile.properties.json'
            const podfileProperties = JSON.parse(fs.readFileSync(podfilePropertiesPath, 'utf8'))
            podfileProperties.newArchEnabled = 'true'
            fs.writeFileSync(podfilePropertiesPath, `${JSON.stringify(podfileProperties, null, 2)}\n`)

            if (process.env.GITHUB_ENV) {
              fs.appendFileSync(process.env.GITHUB_ENV, 'RCT_NEW_ARCH_ENABLED=1\n')
            }

            console.log(`Enabled iOS New Architecture for react-native-reanimated ${reanimatedVersion}`)
          }

          const appDelegateHeaderPath = 'ios/Bangumi/AppDelegate.h'
          const appDelegateImplementationPath = 'ios/Bangumi/AppDelegate.mm'

          if (
            reactNativeMinor >= 81 &&
            fs.existsSync(appDelegateHeaderPath) &&
            fs.existsSync(appDelegateImplementationPath)
          ) {
            let header = fs.readFileSync(appDelegateHeaderPath, 'utf8')
            let implementation = fs.readFileSync(appDelegateImplementationPath, 'utf8')
            let patched = false

            if (header.includes('@interface AppDelegate : EXAppDelegateWrapper')) {
              header = header.replace(/\n#import <Expo\/Expo\.h>\n/, '\n')
              header = header.replace(
                '@interface AppDelegate : EXAppDelegateWrapper',
                '@interface AppDelegate : RCTAppDelegate',
              )
              patched = true
            }

            if (!implementation.includes('<ReactAppDependencyProvider/RCTAppDependencyProvider.h>')) {
              implementation = implementation.replace(
                '#import <React/RCTLinkingManager.h>\n',
                '#import <React/RCTLinkingManager.h>\n#import <ReactAppDependencyProvider/RCTAppDependencyProvider.h>\n',
              )
              patched = true
            }

            if (!implementation.includes('self.dependencyProvider = [RCTAppDependencyProvider new];')) {
              implementation = implementation.replace(
                '  self.moduleName = @"main";\n',
                '  self.moduleName = @"main";\n  self.dependencyProvider = [RCTAppDependencyProvider new];\n',
              )
              patched = true
            }

            if (patched) {
              fs.writeFileSync(appDelegateHeaderPath, header)
              fs.writeFileSync(appDelegateImplementationPath, implementation)
              console.log('Patched iOS AppDelegate to mount the React Native root view on React Native 0.81+')
            }
          }
          NODE

          app_version="$(node -p "require('./app.json').expo.version")"
          plutil -replace CFBundleShortVersionString -string "$app_version" ios/Bangumi/Info.plist
          echo "Synced iOS bundle version to app.json: $app_version"

          node_binary="$(command -v node)"
          {
            printf 'export NODE_BINARY='
            printf '%q' "$node_binary"
            printf '\n'
          } > ios/.xcode.env.local
          echo "NODE_BINARY=$node_binary" >> "$GITHUB_ENV"
          echo "Using Node for Xcode scripts: $node_binary"

      - name: Install JavaScript dependencies
        if: steps.upstream.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          cd "$SOURCE_DIR"

          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version
          yarn install --ignore-scripts --frozen-lockfile --network-timeout 600000
          yarn patch-package --use-yarn || echo "::warning::Some upstream patch-package patches did not apply; continuing for iOS build."

      - name: Install CocoaPods dependencies
        if: steps.upstream.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          cd "$SOURCE_DIR"

          node <<'NODE'
          const fs = require('fs')

          const fmtPodspecPath = 'node_modules/react-native/third-party-podspecs/fmt.podspec'
          if (fs.existsSync(fmtPodspecPath)) {
            const original = fs.readFileSync(fmtPodspecPath, 'utf8')
            const fmtVersion = original.match(/spec\.version\s*=\s*"([^"]+)"/)?.[1] || ''
            const fmtMajor = Number(fmtVersion.split('.')[0])

            let patched = original
            if (fmtMajor >= 11 && original.includes('"CLANG_CXX_LANGUAGE_STANDARD" => rct_cxx_language_standard()')) {
              patched = original.replace(
                '"CLANG_CXX_LANGUAGE_STANDARD" => rct_cxx_language_standard()',
                '"CLANG_CXX_LANGUAGE_STANDARD" => "c++17"',
              )
            }

            if (patched !== original) {
              fs.writeFileSync(fmtPodspecPath, patched)
              console.log(`Pinned fmt ${fmtVersion} pod to c++17 for Xcode compatibility`)
            }
          }
          NODE

          cd ios
          rm -rf Pods Podfile.lock Bangumi.xcworkspace
          pod install --repo-update

      - name: Build Release app
        if: steps.upstream.outputs.should_build == 'true'
        env:
          NODE_ENV: production
          ENTRY_FILE: index.js
        run: |
          set -euo pipefail
          cd "$SOURCE_DIR/ios"

          xcodebuild \
            -workspace Bangumi.xcworkspace \
            -scheme Bangumi \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY= \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            CLANG_WARN_DOCUMENTATION_COMMENTS=NO \
            SWIFT_SUPPRESS_WARNINGS=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package IPA
        if: steps.upstream.outputs.should_build == 'true'
        env:
          ASSET_NAME: ${{ steps.upstream.outputs.asset_name }}
          TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          set -euo pipefail
          cd "$SOURCE_DIR"

          node web/ipa.js

          app_version="$(node -p "require('./app.json').expo.version")"
          generated_ipa="web/bangumi_v${app_version}_archive.ipa"

          if [ ! -f "$generated_ipa" ]; then
            echo "::error::Expected generated IPA not found: $generated_ipa"
            exit 1
          fi

          if [ "$app_version" != "$TAG" ]; then
            echo "::warning::app.json version $app_version does not match upstream tag $TAG."
          fi

          target_ipa="$GITHUB_WORKSPACE/$ASSET_NAME"
          mv "$generated_ipa" "$target_ipa"

          cd "$GITHUB_WORKSPACE"
          shasum -a 256 "$ASSET_NAME" > "$ASSET_NAME.sha256"

          echo "IPA_PATH=$target_ipa" >> "$GITHUB_ENV"
          echo "SHA_PATH=$target_ipa.sha256" >> "$GITHUB_ENV"

      - name: Validate IPA
        if: steps.upstream.outputs.should_build == 'true'
        run: |
          set -euo pipefail

          unzip -t "$IPA_PATH"
          unzip -l "$IPA_PATH" "Payload/Bangumi.app/Info.plist"

          info_plist="$RUNNER_TEMP/Bangumi-Info.plist"
          unzip -p "$IPA_PATH" "Payload/Bangumi.app/Info.plist" > "$info_plist"

          bundle_version="$(plutil -extract CFBundleShortVersionString raw -o - "$info_plist")"
          app_version="$(node -p "require(process.env.SOURCE_DIR + '/app.json').expo.version")"

          if [ "$bundle_version" != "$app_version" ]; then
            echo "::error::Bundle version $bundle_version does not match app.json version $app_version."
            exit 1
          fi

          app_path="$SOURCE_DIR/ios/build/Build/Products/Release-iphoneos/Bangumi.app"
          set +e
          codesign_output="$(codesign -dv "$app_path" 2>&1)"
          codesign_status="$?"
          set -e

          echo "$codesign_output"

          if [ "$codesign_status" -eq 0 ]; then
            echo "::error::Expected unsigned app, but codesign reported a valid signature."
            exit 1
          fi

          if [[ "$codesign_output" != *"code object is not signed at all"* ]]; then
            echo "::error::codesign did not report the expected unsigned-app message."
            exit 1
          fi

          rn_minor="$(node -p "String(require(process.env.SOURCE_DIR + '/package.json').dependencies['react-native'] || '').match(/\\d+\\.(\\d+)/)?.[1] || '0'")"

          if [ "$rn_minor" -ge 81 ]; then
            if grep -q 'EXAppDelegateWrapper' "$SOURCE_DIR/ios/Bangumi/AppDelegate.h"; then
              echo "::error::AppDelegate still uses EXAppDelegateWrapper, which produces a black launch screen with this upstream React Native version."
              exit 1
            fi

            if ! grep -q 'RCTAppDependencyProvider' "$SOURCE_DIR/ios/Bangumi/AppDelegate.mm"; then
              echo "::error::AppDelegate is missing RCTAppDependencyProvider."
              exit 1
            fi
          fi

      - name: Upload release assets
        if: steps.upstream.outputs.should_build == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_REBUILD: ${{ github.event_name == 'push' || github.event.inputs.force == 'true' }}
          TAG: ${{ steps.upstream.outputs.tag }}
        run: node .github/scripts/upstream-ipa.mjs upload --tag "$TAG" --ipa "$IPA_PATH" --sha "$SHA_PATH"
